<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — BarrioConnect</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card__header">
        <div class="auth-card__logo">🏘</div>
        <h1>Bienvenido</h1>
        <p>Ingresá a tu cuenta de BarrioConnect</p>
      </div>

      <div class="auth-card__body">
        <!-- Alerta de error/éxito -->
        <div id="alerta-login" class="alerta" style="display:none;"></div>

        <form id="form-login" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
              placeholder="tu@email.com" autocomplete="email" required>
            <span class="form-error" id="error-email"></span>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-with-icon">
              <input type="password" id="password" name="password"
                placeholder="Tu contraseña" autocomplete="current-password" required>
              <button type="button" class="toggle-password" data-target="password">👁</button>
            </div>
            <span class="form-error" id="error-password"></span>
          </div>

          <button type="submit" class="btn btn--primario btn--full btn--lg" style="margin-top:0.5rem;">
            Ingresar
          </button>
        </form>

        <div class="auth-link">
          ¿No tenés cuenta? <a href="/pages/registro.html">Registrarte gratis</a>
        </div>
        <div class="auth-link" style="margin-top:0.5rem;">
          <a href="/index.html">← Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    // Inicializar toggle de contraseña
    document.addEventListener('DOMContentLoaded', () => {
      initTogglePassword();
      initLogin();
    });
  </script>
</body>
</html>
