<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — BarrioConnect</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card__header">
        <div class="auth-card__logo">🏘</div>
        <h1>Crear cuenta</h1>
        <p>Únite a la comunidad de tu barrio</p>
      </div>

      <div class="auth-card__body">
        <div id="alerta-registro" class="alerta" style="display:none;"></div>

        <form id="form-registro" novalidate>
          <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre"
              placeholder="Juan Pérez" autocomplete="name" required>
            <span class="form-error" id="error-nombre"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
              placeholder="tu@email.com" autocomplete="email" required>
            <span class="form-error" id="error-email"></span>
          </div>

          <div class="form-group">
            <label for="numero-lote">Número de lote</label>
            <input type="text" id="numero-lote" name="numero-lote"
              placeholder="Ej: 42 o A-15" required>
            <small style="color:var(--gris-400);font-size:0.78rem;margin-top:0.3rem;display:block;">
              Cada lote solo puede tener un registro. Si ya existe, contactá al admin.
            </small>
            <span class="form-error" id="error-numero-lote"></span>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-with-icon">
              <input type="password" id="password" name="password"
                placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
              <button type="button" class="toggle-password" data-target="password">👁</button>
            </div>
            <!-- Indicador de fortaleza -->
            <div class="password-strength" id="password-strength">
              <div class="password-strength__bar">
                <div class="password-strength__fill"></div>
              </div>
              <span class="password-strength__label"></span>
            </div>
            <span class="form-error" id="error-password"></span>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirmar contraseña</label>
            <div class="input-with-icon">
              <input type="password" id="confirm-password" name="confirm-password"
                placeholder="Repetí tu contraseña" autocomplete="new-password" required>
              <button type="button" class="toggle-password" data-target="confirm-password">👁</button>
            </div>
            <span class="form-error" id="error-confirm-password"></span>
          </div>

          <button type="submit" class="btn btn--primario btn--full btn--lg" style="margin-top:0.5rem;">
            Crear cuenta
          </button>
        </form>

        <div class="auth-link">
          ¿Ya tenés cuenta? <a href="../pages/login.html">Ingresar</a>
        </div>
        <div class="auth-link" style="margin-top:0.5rem;">
          <a href="/index.html">← Volver al inicio</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initRegistro();
    });
  </script>
</body>
</html>
